<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printable Flashcards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            /* Space between cards so they are easy to cut */
            gap: 15px; 
            justify-content: center;
        }
        
        .card {
            width: auto;
            height: auto;
            /* Dashed border acts as a cut line */
            border: 1px dashed #333; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 25px;
            font-weight: bold;
            text-align: center;
            box-sizing: border-box;
            padding: 15px;
            background-color: #fff;
        }

        /* Print-specific styles to ensure they fit properly on paper */
        @media print {
            body {
                padding: 0;
                gap: 5px; /* Minimal gap for printing */
            }
            .card {
                /* Prevents a card from being split across two pages */
                page-break-inside: avoid;
                /* Ensure borders print properly */
                border: 1px dashed #000; 
            }
            @page {
                margin: 1cm; /* Adjust page margins as needed */
            }
        }
        
        /* Hide controls when printing */
        @media print {
            .controls {
                display: none;
            }
        }
        
        .controls {
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
        }
        #container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px; 
            justify-content: center;
        }
    </style>
</head>
<body>
    <div id="container">
        <!-- Cards will be generated here -->
    </div>

    <script>
        // Fetch 'words.txt' dynamically. 
        // NOTE: Browsers block scripts from reading local files directly using fetch() via the "file://" protocol.
        // You MUST serve this file using a local web server (e.g., Live Server extension, or `python -m http.server`)
        fetch('words.txt')
            .then(response => {
                if (!response.ok) {
                    throw new Error("HTTP error " + response.status);
                }
                return response.text();
            })
            .then(contents => {
                const words = contents.split(/\r?\n/).filter(line => line.trim() !== '');
                
                const container = document.getElementById('container');
                container.innerHTML = ''; // Clear previous cards
                
                words.forEach(word => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.textContent = word;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                document.getElementById('container').innerHTML = 
                    `<p style="color: red; text-align: center; width: 100%;">
                        Failed to load <b>words.txt</b><br><br>
                        Because it's reading a separate file, you must run this HTML page on a local web server (like the VS Code "Live Server" extension, or by running <code>python -m http.server</code> in the terminal) rather than opening the file directly via double-click.
                     </p>`;
                console.error(error);
            });
    </script>
</body>
</html>
